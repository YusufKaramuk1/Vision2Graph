paths:
  model_checkpoint: models/log01_dink34.th
  data_dir: data/train
  output_dir: outputs

inference:
  device: auto          # auto | cpu | cuda
  threshold: 0.5        # sigmoid esigi (yol/arka plan ayrimi)

skeleton:
  min_object_size: 64   # bu boyuttan kucuk beyaz lekeleri ele
  closing_kernel: 3     # yol bosluklarini kapatmak icin morfolojik closing

graph:
  spur_length_threshold: 15   # bu uzunluktan kisa sarkan kenarlari buda (piksel)
  min_component_length: 30    # toplam uzunlugu bu degerin altindaki bilesenleri at (piksel)

scale:
  meters_per_pixel: 0.5       # DeepGlobe nominal cozunurlugu (~50 cm/piksel); yaklasik
                              # null yapilirsa mesafeler piksel cinsinden raporlanir

# Faz 2 - Graph Intelligence: kritiklik skoru bilesenleri ve agirliklari
analytics:
  criticality:
    node_weights:
      betweenness: 0.50     # kac guzergah node'dan gecer
      articulation: 0.35    # kaldirilinca ag parcalanir mi
      degree: 0.15          # kavsak baglanti sayisi
    edge_weights:
      betweenness: 0.60     # kac en-kisa-yol kenari kullanir
      bridge: 0.40          # kenar kopru mu (kaldirilinca bolunur)
  worst_case_top_k: 5       # en kritik kac node icin kapanma simulasyonu

# Faz 3 - Simulation: kademeli saldiri / kapanma simulasyonu
simulation:
  max_fraction: 0.5     # node'larin en fazla bu orani kaldirilarak egri cizilir
  random_runs: 5        # rastsal saldiri egrisi kac kosunun ortalamasi

# Resilience skoru bilesenleri seffaf tutulur (juriye savunulabilir olmasi icin)
resilience:
  weights:
    largest_component_ratio: 0.30
    avg_degree: 0.15
    bridge_ratio: 0.20
    articulation_ratio: 0.20
    targeted_robustness: 0.15
